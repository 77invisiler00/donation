<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sigma Donation System</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f0c29; font-family: sans-serif; color: white; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; width: 300px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .amount { font-size: 32px; font-weight: bold; margin: 15px 0; color: #00ff88; }
        .ios-input { width: 90%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .donate-btn { background: #004a32; color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; }
        .alert { position: fixed; top: -250px; left: 50%; transform: translateX(-50%); width: 300px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border-radius: 30px; padding: 20px; border: 1px solid white; transition: top 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 9999; }
        .alert.active { top: 40px; }
    </style>
</head>
<body>

    <video id="donate-video" style="display:none;" preload="auto" playsinline>
        <source src="https://files.catbox.moe/osp7hx.mp4" type="video/mp4">
    </video>

    <div class="glass-card">
        <div style="font-size: 60px; cursor: pointer;" onclick="activateSound()">🐷</div>
        <h2>Скарбничка</h2>
        <div class="amount">0 грн</div>
        <input type="text" id="name" placeholder="Ім'я" class="ios-input">
        <input type="number" id="sum" placeholder="Сума" class="ios-input">
        <button class="donate-btn" onclick="processDonate()">Надіслати</button>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 10px;">Клікни на свиню для активації звуку</p>
    </div>

    <div id="alert" class="alert">
        <b id="a-name" style="font-size: 20px;"></b>
        <div id="a-sum" style="color: #00ff88; font-size: 24px; font-weight: bold;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0TcJmys0GVlq_ioL-uar8pCxkcdPxUJY",
            authDomain: "donati-66e69.firebaseapp.com",
            projectId: "donati-66e69",
            databaseURL: "https://donati-66e69-default-rtdb.firebaseio.com/",
            appId: "1:275684830224:web:5e836f9abee9c58d3bee95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Активація звуку
        function activateSound() {
            const v = document.getElementById('donate-video');
            v.play().then(() => { v.pause(); v.currentTime = 0; alert("Звук готовий до бою!"); });
        }

        // Слухаємо донати
        db.ref('donations').limitToLast(1).on('child_added', (snap) => {
            const d = snap.val();
            if (Date.now() - d.timestamp < 10000) {
                const v = document.getElementById('donate-video');
                const a = document.getElementById('alert');
                document.getElementById('a-name').innerText = d.name;
                document.getElementById('a-sum').innerText = d.sum + " грн";
                
                a.classList.add('active');
                v.muted = false;
                v.currentTime = 0;
                v.play();
                setTimeout(() => { a.classList.remove('active'); v.pause(); }, 15000);
            }
        });

        // Відправка
        function processDonate() {
            const n = document.getElementById('name').value || "Анонім";
            const s = document.getElementById('sum').value || "0";
            db.ref('donations').push({ name: n, sum: s, timestamp: Date.now() });
            setTimeout(() => { window.open('https://www.oschadbank.ua/p2p', '_blank'); }, 2000);
        }
    </script>
</body>
</html>
