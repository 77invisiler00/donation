<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sigma Donation System</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f0c29; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Картка збору */
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; width: 300px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .amount { font-size: 32px; font-weight: bold; margin: 15px 0; color: #00ff88; }
        .ios-input { width: 90%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .donate-btn { background: #004a32; color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .donate-btn:active { transform: scale(0.95); }

        /* ВІКНО ПРИВІТАННЯ (ALERT) */
        #donation-alert { 
            position: fixed; 
            top: -300px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 320px; 
            background: rgba(255, 255, 255, 0.9); /* Світлий фон для чіткості */
            border-radius: 30px; 
            padding: 25px; 
            color: #000; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
            z-index: 10000;
            text-align: center;
        }
        #donation-alert.active { top: 50px; }
        #a-sum { color: #008f4f; font-size: 28px; font-weight: 900; display: block; margin: 5px 0; }
    </style>
</head>
<body>

    <video id="donate-video" preload="auto" playsinline style="display:none;">
        <source src="https://files.catbox.moe/osp7hx.mp4" type="video/mp4">
    </video>

    <div class="glass-card">
        <div style="font-size: 60px; cursor: pointer; filter: drop-shadow(0 0 10px gold);" onclick="activateSound()">🐷</div>
        <h2>Збір на Мрію</h2>
        <div class="amount">Скарбничка</div>
        <input type="text" id="userName" placeholder="Твоє ім'я" class="ios-input">
        <input type="number" id="userSum" placeholder="Сума (грн)" class="ios-input">
        <button class="donate-btn" onclick="sendDonation()">Підтримати</button>
        <p style="font-size: 11px; opacity: 0.6; margin-top: 15px;">Натисни на свиню, щоб активувати звук!</p>
    </div>

    <div id="donation-alert">
        <div style="font-size: 40px;">🎉</div>
        <span style="font-size: 18px; font-weight: bold;" id="a-name">Ім'я</span>
        <span id="a-sum">0 грн</span>
        <div style="font-size: 14px; opacity: 0.7;">Дякуємо за підтримку!</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0TcJmys0GVlq_ioL-uar8pCxkcdPxUJY",
            authDomain: "donati-66e69.firebaseapp.com",
            projectId: "donati-66e69",
            databaseURL: "https://donati-66e69-default-rtdb.firebaseio.com/",
            appId: "1:275684830224:web:5e836f9abee9c58d3bee95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function activateSound() {
            const v = document.getElementById('donate-video');
            v.play().then(() => { 
                v.pause(); 
                v.currentTime = 0; 
                alert("Звук налаштовано! Тепер не закривай цю вкладку."); 
            });
        }

        // ПРИЙОМ ДОНАТУ
        db.ref('donations').limitToLast(1).on('child_added', (snap) => {
            const data = snap.val();
            // Перевірка часу (щоб не показувати старі донати при перезавантаженні)
            if (Date.now() - data.timestamp < 10000) {
                const video = document.getElementById('donate-video');
                const alertBox = document.getElementById('donation-alert');
                
                document.getElementById('a-name').innerText = data.name;
                document.getElementById('a-sum').innerText = data.sum + " грн";
                
                // Налаштування звуку (прибираємо хрипи)
                video.volume = 0.7; 
                video.currentTime = 0;
                
                // Показ вікна
                alertBox.classList.add('active');
                video.play();

                // Сховати через 12 секунд
                setTimeout(() => { 
                    alertBox.classList.remove('active'); 
                    video.pause();
                }, 12000);
            }
        });

        // ВІДПРАВКА ДОНАТУ
        function sendDonation() {
            const name = document.getElementById('userName').value || "Анонім";
            const sum = document.getElementById('userSum').value || "0";
            
            db.ref('donations').push({
                name: name,
                sum: sum,
                timestamp: Date.now()
            }).then(() => {
                // Перехід на банк (Ощад або Моно)
                setTimeout(() => { 
                    window.open('https://www.oschadbank.ua/p2p', '_blank'); 
                }, 1500);
            });
        }
    </script>
</body>
</html>
