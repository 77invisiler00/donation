<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Донат Система</title>
    <style>
        /* Стилі, щоб все виглядало як на скріншотах раніше */
        body { margin: 0; background: #0f0c29; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 10px; border: none; }
        button { background: #00ff88; color: #000; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(0,255,136,0.9); padding: 20px; border-radius: 15px; transition: 0.5s; color: black; }
        .alert.active { top: 20px; }
    </style>
</head>
<body>

    <video id="donate-video" style="display:none;"><source src="video/jester-music.mp4" type="video/mp4"></video>

    <div class="glass-card">
        <h1>💸 Збір</h1>
        <input type="text" id="name" placeholder="Ім'я">
        <input type="number" id="sum" placeholder="Сума">
        <input type="text" id="msg" placeholder="Повідомлення">
        <button onclick="processDonate()">Надіслати</button>
    </div>

    <div id="alert" class="alert">
        <b id="alert-name"></b> задонатив <b id="alert-sum"></b>!
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ВСТАВ СВОЇ КЛЮЧІ FIREBASE ТУТ (які ти копіював минулого разу)
        const firebaseConfig = {
            apiKey: "AIzaSyC0TcJmys0GVlq_ioL-uar8pCxkcdPxUJY",
            authDomain: "donati-66e69.firebaseapp.com",
            projectId: "donati-66e69",
            storageBucket: "donati-66e69.firebasestorage.app",
            messagingSenderId: "275684830224",
            appId: "1:275684830224:web:5e836f9abee9c58d3bee95",
            databaseURL: "https://donati-66e69-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Слухаємо базу даних
        db.ref('donations').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (Date.now() - data.timestamp < 10000) {
                showNotif(data.name, data.sum, data.msg);
            }
        });

        function processDonate() {
            const n = document.getElementById('name').value || "Анонім";
            const s = document.getElementById('sum').value || "0";
            const m = document.getElementById('msg').value || "Дякую!";

            db.ref('donations').push({ name: n, sum: s, msg: m, timestamp: Date.now() });
            setTimeout(() => { window.open('https://www.oschadbank.ua/p2p', '_blank'); }, 2000);
        }

        function showNotif(name, sum, msg) {
            const v = document.getElementById('donate-video');
            const a = document.getElementById('alert');
            document.getElementById('alert-name').innerText = name;
            document.getElementById('alert-sum').innerText = sum + " грн";
            
            a.classList.add('active');
            v.currentTime = 0;
            v.play();
            setTimeout(() => a.classList.remove('active'), 10000);
        }
    </script>
</body>
</html>
