<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Donation System</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f0c29; font-family: sans-serif; color: white; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; width: 300px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .amount { font-size: 32px; font-weight: bold; margin: 15px 0; color: #00ff88; }
        .ios-input { width: 90%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .donate-btn { background: #004a32; color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        #donation-alert { 
            position: fixed; top: -300px; left: 50%; transform: translateX(-50%); 
            width: 320px; background: white; border-radius: 30px; padding: 25px; 
            color: #000; box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); text-align: center; z-index: 10000;
        }
        #donation-alert.active { top: 50px; }
        #a-sum { color: #008f4f; font-size: 28px; font-weight: 900; display: block; }
    </style>
</head>
<body>

    <video id="donate-video" preload="auto" playsinline style="display:none;">
        <source src="https://files.catbox.moe/osp7hx.mp4" type="video/mp4">
    </video>

    <div class="glass-card">
        <div style="font-size: 60px; cursor: pointer;" onclick="activateSound()">🐷</div>
        <h2>Збір Sigma</h2>
        <div class="amount">Скарбничка</div>
        <input type="text" id="userName" placeholder="Твоє ім'я" class="ios-input">
        <input type="number" id="userSum" placeholder="Сума (грн)" class="ios-input">
        <button class="donate-btn" onclick="sendDonation()">Задонатити</button>
        <p style="font-size: 10px; opacity: 0.5;">Натисни на свиню для звуку</p>
    </div>

    <div id="donation-alert">
        <div style="font-size: 40px;">🎉</div>
        <b id="a-name" style="font-size: 18px;">Ім'я</b>
        <span id="a-sum">0 грн</span>
        <p>Дякуємо за підтримку!</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0TcJmys0GVlq_ioL-uar8pCxkcdPxUJY",
            authDomain: "donati-66e69.firebaseapp.com",
            projectId: "donati-66e69",
            databaseURL: "https://donati-66e69-default-rtdb.firebaseio.com/",
            appId: "1:275684830224:web:5e836f9abee9c58d3bee95"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function activateSound() {
            const v = document.getElementById('donate-video');
            v.load();
            v.play().then(() => { v.pause(); v.currentTime = 0; alert("Звук готовий!"); });
        }

        db.ref('donations').limitToLast(1).on('child_added', (snap) => {
            const data = snap.val();
            if (Date.now() - data.timestamp < 10000) {
                const video = document.getElementById('donate-video');
                const alertBox = document.getElementById('donation-alert');
                document.getElementById('a-name').innerText = data.name;
                document.getElementById('a-sum').innerText = data.sum + " грн";
                
                alertBox.classList.add('active');
                video.volume = 0.8;
                video.currentTime = 0;
                video.play();

                setTimeout(() => { alertBox.classList.remove('active'); video.pause(); }, 15000);
            }
        });

        function sendDonation() {
            const name = document.getElementById('userName').value || "Анонім";
            const sum = document.getElementById('userSum').value || "0";
            db.ref('donations').push({ name, sum, timestamp: Date.now() }).then(() => {
                setTimeout(() => { window.open('https://www.oschadbank.ua/p2p', '_blank'); }, 1000);
            });
        }
    </script>
</body>
</html>
